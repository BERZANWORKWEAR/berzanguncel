services:
  - type: web
    name: berzan-api
    runtime: node
    rootDir: api
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: erp-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: ERP_DATA_DIR
        value: /var/data
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_SECURE
        value: "false"
      - key: MAIL_FROM
        sync: false
