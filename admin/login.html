<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Girişi — BERZAN</title>
    <link href="/src/styles/styles.css" rel="stylesheet"/>
    <style>
        :root {
            --primary: #ff6700;
            --dark: #131d2e;
            --bg: #f5f5f7;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-card {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            background: var(--primary);
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: 800;
            margin: 0 auto 24px;
        }

        h1 {
            font-size: 24px;
            color: var(--dark);
            margin-bottom: 8px;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 103, 0, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #000;
            transform: translateY(-2px);
        }

        .error-msg {
            color: #ff4d4f;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }

        .back-home {
            display: inline-block;
            margin-top: 24px;
            color: #888;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
        }

        .back-home:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">B</div>
    <h1>Yönetim Paneli</h1>
    <p>Ürünlerinizi yönetmek için giriş yapın.</p>

    <form id="loginForm">
        <div class="form-group">
            <label for="username">Kullanıcı Adı</label>
            <input type="text" id="username" placeholder="Kullanıcı adınızı girin" required>
        </div>
        <div class="form-group">
            <label for="password">Şifre</label>
            <input type="password" id="password" placeholder="Şifrenizi girin" required>
        </div>
        <button type="submit" class="btn">Giriş Yap</button>
        <div id="errorMsg" class="error-msg">Hatalı kullanıcı adı veya şifre!</div>
    </form>

    <a href="/" class="back-home">← Ana Sayfaya Dön</a>
</div>

<script type="module">
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // User provided: Qazi Muhammed / Kurdeberz1.
        if (user === 'Qazi Muhammed' && pass === 'Kurdeberz1.') {
            // Simple session management
            sessionStorage.setItem('berzan_admin_auth', 'true');
            sessionStorage.setItem('berzan_admin_user', user);
            window.location.href = '/admin/';
        } else {
            errorMsg.style.display = 'block';
            setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
        }
    });
</script>

</body>
</html>
