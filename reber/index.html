<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>BERZAN — İç Yönetim Paneli</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        navy:        '#131D2E',
        'navy-2':    '#1e2c44',
        'navy-3':    '#2a3b59',
        teal:        '#0d9488',
        'teal-2':    '#14b8a6',
      }}}
    };
  </script>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .ms { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal;
          line-height: 1; vertical-align: middle; -webkit-font-feature-settings: 'liga'; }
    .hide { display: none !important; }
    /* basit modal */
    .modal-backdrop { background: rgba(19,29,46,.55); }
    table { border-collapse: collapse; }
    .tbl th, .tbl td { white-space: nowrap; }
    /* mobil tablo kaydırma */
    .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">

  <!-- ====================== GİRİŞ EKRANI ====================== -->
  <div id="login-view" class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm bg-white rounded-2xl shadow-xl border border-slate-200 p-8">
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-navy text-white mb-3">
          <span class="ms text-3xl">lock</span>
        </div>
        <h1 class="text-xl font-bold text-navy">BERZAN İç Panel</h1>
        <p class="text-sm text-slate-500 mt-1">Devam etmek için giriş yapın</p>
      </div>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Kullanıcı adı / E-posta</label>
          <input id="login-user" type="text" autocomplete="username" required placeholder="ornek@berzan.com.tr"
                 class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Şifre</label>
          <input id="login-pass" type="password" autocomplete="current-password" required
                 class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal" />
        </div>
        <p id="login-error" class="text-sm text-red-600 hide"></p>
        <button type="submit"
                class="w-full bg-navy hover:bg-navy-2 text-white font-medium py-2.5 rounded-lg transition flex items-center justify-center gap-2">
          <span id="login-btn-text">Giriş Yap</span>
        </button>
      </form>

      <p id="config-warn" class="text-xs text-amber-600 mt-4 hide">
        ⚠️ Supabase ayarları yapılmamış. <code>reber/config.js</code> dosyasını doldurun.
      </p>
    </div>
  </div>

  <!-- ====================== UYGULAMA ====================== -->
  <div id="app-view" class="hide">
    <!-- Üst bar -->
    <header class="bg-navy text-white sticky top-0 z-30 shadow">
      <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
        <div class="flex items-center gap-2 font-bold tracking-tight">
          <span class="ms text-teal-2">dashboard</span> BERZAN <span class="text-slate-400 font-normal hidden sm:inline">İç Panel</span>
        </div>
        <div class="flex items-center gap-3 text-sm">
          <span id="current-user" class="text-slate-300 hidden sm:inline"></span>
          <button id="logout-btn" class="bg-navy-2 hover:bg-navy-3 px-3 py-1.5 rounded-lg flex items-center gap-1">
            <span class="ms text-base">logout</span> Çıkış
          </button>
        </div>
      </div>
      <!-- Sekmeler -->
      <nav class="bg-navy-2 border-t border-navy-3">
        <div class="max-w-7xl mx-auto px-2 flex gap-1 overflow-x-auto text-sm">
          <button data-tab="dashboard"  class="tab-btn px-3 py-2.5 whitespace-nowrap flex items-center gap-1"><span class="ms text-base">insights</span>Gösterge</button>
          <button data-tab="talepler"   class="tab-btn px-3 py-2.5 whitespace-nowrap flex items-center gap-1"><span class="ms text-base">list_alt</span>Talepler</button>
          <button data-tab="tedarikciler" class="tab-btn px-3 py-2.5 whitespace-nowrap flex items-center gap-1"><span class="ms text-base">store</span>Tedarikçiler</button>
          <button data-tab="teklifler"  class="tab-btn px-3 py-2.5 whitespace-nowrap flex items-center gap-1"><span class="ms text-base">request_quote</span>Teklif & Fiyat</button>
          <button data-tab="siparisler" class="tab-btn px-3 py-2.5 whitespace-nowrap flex items-center gap-1"><span class="ms text-base">local_shipping</span>Siparişler</button>
          <button data-tab="webbasvuru" class="tab-btn px-3 py-2.5 whitespace-nowrap flex items-center gap-1"><span class="ms text-base">mark_email_unread</span>Web Başvuruları</button>
        </div>
      </nav>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
      <div id="panel-dashboard"   class="panel"></div>
      <div id="panel-talepler"    class="panel hide"></div>
      <div id="panel-tedarikciler" class="panel hide"></div>
      <div id="panel-teklifler"   class="panel hide"></div>
      <div id="panel-siparisler"  class="panel hide"></div>
      <div id="panel-webbasvuru"  class="panel hide"></div>
    </main>
  </div>

  <!-- ====================== MODAL ====================== -->
  <div id="modal" class="hide fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between px-5 py-3 border-b border-slate-200 sticky top-0 bg-white">
        <h3 id="modal-title" class="font-semibold text-navy"></h3>
        <button id="modal-close" class="text-slate-400 hover:text-slate-700"><span class="ms">close</span></button>
      </div>
      <div id="modal-body" class="p-5"></div>
    </div>
  </div>

  <!-- Bildirim (toast) -->
  <div id="toast" class="hide fixed bottom-4 right-4 z-[60] bg-navy text-white px-4 py-3 rounded-lg shadow-lg text-sm"></div>

  <!-- Kütüphaneler -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
