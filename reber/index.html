<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>BERZAN ERP — İç Panel</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          "tertiary-fixed-dim": "#b7c8e1", "on-primary-container": "#7b859a", "on-primary": "#ffffff",
          "on-tertiary-fixed-variant": "#38485d", "tertiary-fixed": "#d3e4fe", "surface-variant": "#dfe3e7",
          "on-secondary-container": "#006f66", "on-surface": "#171c1f", "error-container": "#ffdad6",
          "inverse-surface": "#2c3134", "primary-fixed-dim": "#bdc7de", "inverse-primary": "#bdc7de",
          "on-error-container": "#93000a", "on-surface-variant": "#45474c", "on-tertiary-fixed": "#0b1c30",
          "surface-container-lowest": "#ffffff", "on-secondary": "#ffffff", "tertiary-container": "#0d1e31",
          "surface-container-highest": "#dfe3e7", "tertiary": "#00030a", "on-error": "#ffffff",
          "surface-tint": "#555f72", "surface-bright": "#f6fafe", "primary": "#00020a",
          "on-secondary-fixed-variant": "#005049", "on-background": "#171c1f", "outline": "#75777d",
          "on-tertiary": "#ffffff", "surface": "#f6fafe", "error": "#ba1a1a", "surface-dim": "#d6dade",
          "surface-container-low": "#f0f4f8", "primary-fixed": "#d9e3fa", "surface-container": "#eaeef2",
          "on-tertiary-container": "#76869e", "secondary-fixed-dim": "#6bd8cb", "background": "#f6fafe",
          "secondary-container": "#86f2e4", "on-primary-fixed": "#121c2d", "on-secondary-fixed": "#00201d",
          "inverse-on-surface": "#edf1f5", "outline-variant": "#c5c6cd", "surface-container-high": "#e4e9ed",
          "on-primary-fixed-variant": "#3d475a", "secondary": "#006a61", "primary-container": "#131d2e",
          "secondary-fixed": "#89f5e7",
          "navy": "#131d2e", "navy-2": "#0b1426", "teal": "#006a61", "teal-2": "#00564f"
        },
        borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
        spacing: { "gutter": "16px", "sidebar-width": "260px", "container-padding": "24px" },
        fontFamily: {
          "headline-lg": ["Inter"], "stat-number": ["Inter"], "body-md": ["Inter"], "headline-md": ["Inter"],
          "label-md": ["Inter"], "body-lg": ["Inter"], "headline-xl": ["Inter"], "headline-lg-mobile": ["Inter"]
        },
        fontSize: {
          "headline-lg": ["24px", { lineHeight: "32px", letterSpacing: "-0.01em", fontWeight: "700" }],
          "stat-number": ["28px", { lineHeight: "34px", fontWeight: "700" }],
          "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],
          "headline-md": ["20px", { lineHeight: "28px", fontWeight: "600" }],
          "label-md": ["12px", { lineHeight: "16px", fontWeight: "600" }],
          "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
          "headline-xl": ["32px", { lineHeight: "40px", letterSpacing: "-0.02em", fontWeight: "700" }],
          "headline-lg-mobile": ["20px", { lineHeight: "28px", fontWeight: "700" }]
        }
      }}
    };
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #F1F5F9; }
    .ms, .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal;
      line-height: 1; vertical-align: middle; -webkit-font-feature-settings: 'liga'; font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .star-fill { font-variation-settings: 'FILL' 1; }
    .hide { display: none !important; }
    .modal-backdrop { background: rgba(19,29,46,.55); }
    .glass-card, .card-elevation { background:#fff; border:1px solid #E2E8F0; box-shadow:0 4px 12px rgba(0,0,0,.05); }
    .shadow-ambient, .card-shadow { box-shadow:0 4px 12px rgba(0,0,0,.05); }
    .status-pill { padding:2px 10px; border-radius:9999px; font-size:11px; font-weight:600; display:inline-block; }
    .new-row-highlight { background-color:#f0fdfa; border-left:4px solid #0D9488; }
    .delay-indicator { position:absolute; left:0; top:0; bottom:0; width:4px; background-color:#ba1a1a; }
    table { border-collapse: collapse; }
    .tbl-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    ::-webkit-scrollbar { width:6px; height:6px; } ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:10px; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .animate-fade-in { animation: fadeIn .35s ease-out forwards; }
  </style>
</head>
<body class="text-on-surface min-h-screen">

  <!-- ====================== GİRİŞ EKRANI ====================== -->
  <div id="login-view" class="min-h-screen flex items-center justify-center px-4 bg-primary-container">
    <div class="w-full max-w-sm bg-white rounded-2xl p-8" style="box-shadow:0 10px 25px rgba(0,0,0,.15)">
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-secondary text-white mb-3">
          <span class="ms text-3xl">lock</span>
        </div>
        <h1 class="text-xl font-bold text-primary">BERZAN İç Panel</h1>
        <p class="text-sm text-on-surface-variant mt-1">Devam etmek için giriş yapın</p>
      </div>
      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-on-surface mb-1">Kullanıcı adı / E-posta</label>
          <input id="login-user" type="text" autocomplete="username" required placeholder="ornek@berzan.com.tr"
                 class="w-full rounded-lg border border-outline-variant px-3 py-2 focus:outline-none focus:ring-2 focus:ring-secondary" />
        </div>
        <div>
          <label class="block text-sm font-medium text-on-surface mb-1">Şifre</label>
          <input id="login-pass" type="password" autocomplete="current-password" required
                 class="w-full rounded-lg border border-outline-variant px-3 py-2 focus:outline-none focus:ring-2 focus:ring-secondary" />
        </div>
        <p id="login-error" class="text-sm text-red-600 hide"></p>
        <button type="submit" class="w-full bg-primary hover:brightness-125 text-white font-medium py-2.5 rounded-lg transition flex items-center justify-center gap-2">
          <span id="login-btn-text">Giriş Yap</span>
        </button>
      </form>
      <p id="config-warn" class="text-xs text-amber-600 mt-4 hide">⚠️ Supabase ayarları yapılmamış. <code>reber/config.js</code> doldurun.</p>
    </div>
  </div>

  <!-- ====================== UYGULAMA ====================== -->
  <div id="app-view" class="hide md:flex min-h-screen">
    <!-- SIDEBAR -->
    <aside id="sidebar" class="fixed left-0 top-0 h-screen w-sidebar-width bg-primary-container flex flex-col py-6 z-50 -translate-x-full md:translate-x-0 transition-transform duration-300">
      <div class="px-5 mb-8">
        <img src="/public/img/berzan-logo-white.png" alt="BERZAN" class="h-7 w-auto" />
        <p class="text-[11px] text-on-primary-container uppercase tracking-widest mt-2 opacity-80">ERP · İç Panel</p>
      </div>
      <nav class="flex-1 space-y-1 px-3">
        <button data-tab="dashboard"    class="tab-btn w-full text-left flex items-center gap-3 px-4 py-3 border-l-4 border-transparent text-on-primary/70 hover:text-on-primary hover:bg-white/5 transition-colors"><span class="ms">dashboard</span><span class="font-label-md text-label-md">Gösterge Paneli</span></button>
        <button data-tab="talepler"     class="tab-btn w-full text-left flex items-center gap-3 px-4 py-3 border-l-4 border-transparent text-on-primary/70 hover:text-on-primary hover:bg-white/5 transition-colors"><span class="ms">assignment</span><span class="font-label-md text-label-md">Talep Takip</span></button>
        <button data-tab="tedarikciler" class="tab-btn w-full text-left flex items-center gap-3 px-4 py-3 border-l-4 border-transparent text-on-primary/70 hover:text-on-primary hover:bg-white/5 transition-colors"><span class="ms">inventory_2</span><span class="font-label-md text-label-md">Tedarikçiler</span></button>
        <button data-tab="teklifler"    class="tab-btn w-full text-left flex items-center gap-3 px-4 py-3 border-l-4 border-transparent text-on-primary/70 hover:text-on-primary hover:bg-white/5 transition-colors"><span class="ms">request_quote</span><span class="font-label-md text-label-md">Teklif &amp; Fiyatlandırma</span></button>
        <button data-tab="siparisler"   class="tab-btn w-full text-left flex items-center gap-3 px-4 py-3 border-l-4 border-transparent text-on-primary/70 hover:text-on-primary hover:bg-white/5 transition-colors"><span class="ms">local_shipping</span><span class="font-label-md text-label-md">Sipariş Takibi</span></button>
        <button data-tab="webbasvuru"   class="tab-btn w-full text-left flex items-center gap-3 px-4 py-3 border-l-4 border-transparent text-on-primary/70 hover:text-on-primary hover:bg-white/5 transition-colors"><span class="ms">web</span><span class="font-label-md text-label-md">Web Başvuruları</span></button>
      </nav>
      <div class="mt-auto px-3">
        <button id="logout-btn" class="w-full text-left flex items-center gap-3 px-4 py-3 text-on-primary/70 hover:text-on-primary hover:bg-white/5 rounded-lg transition-colors"><span class="ms">logout</span><span class="font-label-md text-label-md">Çıkış</span></button>
      </div>
    </aside>
    <div id="sidebar-overlay" class="hide fixed inset-0 bg-black/40 z-40 md:hidden"></div>

    <!-- ANA İÇERİK -->
    <main class="flex-1 md:ml-sidebar-width flex flex-col min-h-screen">
      <header class="sticky top-0 z-30 flex items-center justify-between h-16 px-4 md:px-container-padding bg-surface border-b border-outline-variant">
        <div class="flex items-center gap-4 flex-1">
          <button id="sidebar-toggle" class="md:hidden text-on-surface-variant p-1" aria-label="Menü"><span class="ms text-2xl">menu</span></button>
          <div class="relative w-full max-w-md hidden sm:block">
            <span class="ms absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
            <input id="global-search" autocomplete="off" class="w-full bg-surface-container-low border-none rounded-lg pl-10 pr-4 py-2 text-body-md focus:ring-2 focus:ring-secondary/20 outline-none" placeholder="Tüm panelde ara: müşteri, tedarikçi, ürün, sipariş…" type="text"/>
            <div id="search-results" class="hide absolute top-full left-0 right-0 mt-2 bg-white rounded-xl shadow-2xl border border-outline-variant max-h-[70vh] overflow-y-auto z-50"></div>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <button id="topbar-yeni" class="bg-primary text-on-primary px-4 py-2 rounded-lg font-label-md text-label-md flex items-center gap-2 hover:brightness-125 transition"><span class="ms text-[18px]">add</span> Yeni Talep</button>
          <div class="flex items-center gap-3 pl-2 border-l border-outline-variant">
            <span class="w-10 h-10 rounded-full bg-secondary/15 text-secondary flex items-center justify-center border-2 border-secondary/30"><span class="ms">person</span></span>
            <span id="current-user" class="text-label-md text-on-surface hidden sm:inline"></span>
          </div>
        </div>
      </header>

      <div class="p-4 md:p-container-padding flex-1 bg-[#F1F5F9]">
        <div id="panel-dashboard"   class="panel"></div>
        <div id="panel-talepler"    class="panel hide"></div>
        <div id="panel-tedarikciler" class="panel hide"></div>
        <div id="panel-teklifler"   class="panel hide"></div>
        <div id="panel-siparisler"  class="panel hide"></div>
        <div id="panel-webbasvuru"  class="panel hide"></div>
      </div>
    </main>
  </div>

  <!-- ====================== MODAL ====================== -->
  <div id="modal" class="hide fixed inset-0 z-[60] flex items-center justify-center p-4 modal-backdrop">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between px-5 py-3 border-b border-outline-variant sticky top-0 bg-white">
        <h3 id="modal-title" class="font-semibold text-primary"></h3>
        <button id="modal-close" class="text-on-surface-variant hover:text-on-surface"><span class="ms">close</span></button>
      </div>
      <div id="modal-body" class="p-5"></div>
    </div>
  </div>

  <div id="toast" class="hide fixed bottom-4 right-4 z-[70] bg-primary text-white px-4 py-3 rounded-lg shadow-lg text-sm"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="./config.js?v=4"></script>
  <script src="./app.js?v=4"></script>
</body>
</html>
