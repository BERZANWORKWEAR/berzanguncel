<!doctype html>
<html lang="tr">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <title>Kurdistan</title>
  <meta content="Kurdistan bayrağı temalı sayfa." name="description"/>
  <meta content="#111111" name="theme-color"/>
  <link href="/img/logo.svg" rel="icon" type="image/svg+xml"/>
  <style>
   :root{
    --bg:#0b0b0c;
    --card:rgba(255,255,255,.08);
    --border:rgba(255,255,255,.14);
    --text:#f8f8f8;
    --muted:rgba(255,255,255,.7);
   }
   *{box-sizing:border-box}
   body{
    margin:0;
    min-height:100vh;
    display:grid;
    place-items:center;
    background:
      radial-gradient(circle at top, rgba(255,255,255,.08), transparent 28%),
      linear-gradient(180deg, #070707 0%, #111214 100%);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
    overflow:hidden;
   }
   .scene{
    width:min(92vw, 980px);
    padding:28px;
    border-radius:32px;
    border:1px solid var(--border);
    background:var(--card);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    box-shadow:0 30px 100px rgba(0,0,0,.4);
   }
   .flag{
    width:100%;
    aspect-ratio:16 / 10;
    overflow:hidden;
    border-radius:24px;
    border:1px solid rgba(255,255,255,.12);
    box-shadow:0 24px 60px rgba(0,0,0,.32);
   }
   .copy{
    margin-top:22px;
    display:flex;
    justify-content:space-between;
    gap:20px;
    align-items:end;
  }
  h1{
    margin:0;
    font-size:clamp(40px, 7vw, 82px);
    letter-spacing:-.06em;
    line-height:.94;
  }
  p{
    margin:8px 0 0;
    max-width:48ch;
    color:var(--muted);
    font-size:clamp(15px, 1.6vw, 19px);
  }
  .badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:46px;
    padding:0 16px;
    border-radius:999px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    color:#ffe066;
    font-weight:700;
    white-space:nowrap;
   }
   @media (max-width: 780px){
    .copy{
      flex-direction:column;
      align-items:flex-start;
    }
   }
  </style>
 </head>
 <body>
  <main class="scene">
   <div class="flag" aria-label="Kurdistan bayrağı">
    <svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
     <rect width="1600" height="333.34" fill="#D61F26"/>
     <rect y="333.33" width="1600" height="333.34" fill="#FFFFFF"/>
     <rect y="666.66" width="1600" height="333.34" fill="#1FA04A"/>
     <g transform="translate(800 500)">
      <circle r="70" fill="#F5C400"/>
      <g fill="#F5C400">
       <polygon points="0,-250 20,-88 -20,-88"/>
       <polygon points="48,-245 44,-82 6,-93"/>
       <polygon points="93,-232 68,-71 33,-91"/>
       <polygon points="135,-211 91,-54 60,-82"/>
       <polygon points="172,-183 111,-32 86,-67"/>
       <polygon points="203,-149 128,-7 111,-48"/>
       <polygon points="227,-111 139,18 131,-26"/>
       <polygon points="243,-70 143,44 144,0"/>
       <polygon points="250,-24 140,69 148,25"/>
       <polygon points="249,24 131,93 147,49"/>
       <polygon points="240,70 117,114 141,74"/>
       <polygon points="222,112 98,133 129,96"/>
       <polygon points="198,150 75,147 112,116"/>
       <polygon points="166,182 49,155 91,132"/>
       <polygon points="128,210 21,157 66,143"/>
       <polygon points="86,232 -8,151 38,147"/>
       <polygon points="41,246 -36,142 8,146"/>
       <polygon points="-6,250 -62,130 -18,143"/>
       <polygon points="-52,244 -86,114 -45,137"/>
       <polygon points="-95,231 -107,95 -71,126"/>
       <polygon points="-135,210 -125,74 -96,111"/>
       <polygon points="-171,182 -138,49 -118,91"/>
       <polygon points="-202,148 -146,21 -135,66"/>
       <polygon points="-227,108 -149,-7 -146,39"/>
       <polygon points="-243,67 -145,-34 -149,11"/>
       <polygon points="-250,20 -137,-60 -149,-17"/>
       <polygon points="-248,-28 -124,-84 -144,-43"/>
       <polygon points="-237,-74 -106,-105 -133,-68"/>
       <polygon points="-217,-118 -84,-124 -118,-91"/>
       <polygon points="-189,-158 -59,-138 -99,-111"/>
       <polygon points="-154,-197 -31,-146 -76,-128"/>
       <polygon points="-113,-223 -2,-149 -48,-141"/>
       <polygon points="-68,-241 27,-145 -19,-147"/>
      </g>
     </g>
    </svg>
   </div>

   <div class="copy">
    <div>
     <h1>Kurdistan</h1>
     <p>Bu rota için özel bir açılış sayfası eklendi. `/kurd` adresi doğrudan bu bayrak sayfasını açar.</p>
    </div>
    <div class="badge">/kurd</div>
   </div>
  </main>
 </body>
</html>
